<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ezequielito app icon
  Brand palette: lime #c8ff00 on pitch black #0a0a0a
  Source: matches ezequiellamas-landing identity

  To regenerate platform icons after edits:
    cd src-tauri
    bunx tauri icon icons/ezequielito-source.png
  (you'll need a 1024x1024 PNG export of this SVG; use Inkscape or
  online converter like https://cloudconvert.com/svg-to-png)
-->
<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Black rounded-square background (matches landing site logo style) -->
  <rect width="1024" height="1024" rx="192" ry="192" fill="#0a0a0a" />

  <!-- Stylized microphone in lime accent -->
  <g
    transform="translate(512 512)"
    fill="none"
    stroke="#c8ff00"
    stroke-width="48"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <!-- Mic capsule (top body) -->
    <rect
      x="-100"
      y="-260"
      width="200"
      height="380"
      rx="100"
      ry="100"
      fill="#c8ff00"
      stroke="none"
    />
    <!-- Mic stand arc -->
    <path d="M -220 30 A 220 220 0 0 0 220 30" />
    <!-- Mic stem -->
    <line x1="0" y1="160" x2="0" y2="280" />
    <!-- Mic base -->
    <line x1="-90" y1="280" x2="90" y2="280" />
  </g>

  <!-- Subtle "Ez" wordmark in bottom-right (Instrument Serif vibe) -->
  <text
    x="880"
    y="940"
    text-anchor="end"
    font-family="Instrument Serif, Georgia, serif"
    font-style="italic"
    font-size="120"
    fill="#c8ff00"
    opacity="0.85"
  >Ez</text>
</svg>
